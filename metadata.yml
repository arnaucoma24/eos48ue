Identifier: eos48ue
Slug: surrogate-adme-gnn
Status: In progress
Title: Surrogate ADME Multi-Task Predictor
Description: Multi-task graph neural network pretrained on synthetic ADME labels
  for 270, 000+ compounds across 25 endpoints. Predicts permeability (Caco-2, 
  PAMPA, LE-MDCK Papp), intrinsic clearance in rat, human, and mouse liver 
  microsomes, plasma protein binding, fraction unbound, LogP, LogD, and CYP450 
  reversible inhibition. Supports fine-tuning on experimental data for 
  prospective drug discovery applications.
